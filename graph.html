<!DOCTYPE html>
<html>
<head>
    <title>Wiki Graph View</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; margin: 0; font-family: sans-serif; }
        #cy { width: 100%; height: 90vh; display: block; }
        h2 { padding: 10px; margin: 0; background: #252525; font-size: 18px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <h2>My Wiki Knowledge Graph</h2>
    <div id="cy"></div>

<script>
async function drawGraph() {
    // 1. Fetch both Posts AND Pages
    const [postsRes, pagesRes] = await Promise.all([
        fetch('http://localhost:8081/index.php?rest_route=/wp/v2/posts&per_page=100'),
        fetch('http://localhost:8081/index.php?rest_route=/wp/v2/pages&per_page=100')
    ]);

    const posts = await postsRes.json();
    const pages = await pagesRes.json();
    
    // Combine them into one big list
    const allContent = [...posts, ...pages];

    const nodes = [];
    const edges = [];
    const siteUrl = "http://localhost:8081";

    // 2. Map everything to Nodes
    allContent.forEach(item => {
        nodes.push({ 
            data: { 
                id: item.id, 
                label: item.title.rendered.replace(/&#8211;/g, '-'),
                url: item.link // We'll save this for clicking later!
            } 
        });
    });

// 3. The "Link Logic" (The Connector)
    allContent.forEach(sourceItem => {
        // This regex looks for links that point to your local site
        const linkPattern = new RegExp(`${siteUrl}/([^/"'\\s>]+)`, 'g');
        let match;

        // Scan the actual HTML content of the page for links
        while ((match = linkPattern.exec(sourceItem.content.rendered)) !== null) {
            let targetSlug = match[1];
            
            // Clean up the slug (remove trailing slashes or extra bits)
            targetSlug = targetSlug.replace(/\/$/, ""); 

            // Find the ID of the post that matches that slug
            const targetItem = allContent.find(p => p.slug === targetSlug);
            
            if (targetItem && targetItem.id !== sourceItem.id) {
                edges.push({ 
                    data: { 
                        id: `e${sourceItem.id}-${targetItem.id}`,
                        source: sourceItem.id, 
                        target: targetItem.id 
                    } 
                });
            }
        }
    });

    // 4. Initialize Cytoscape
    const cy = cytoscape({
        container: document.getElementById('cy'),
        elements: { nodes, edges },
        style: [
            {
                selector: 'node',
                style: {
                    'background-color': '#7b5eea', // Obsidian Purple
                    'label': 'data(label)',
                    'color': '#fff',
                    'font-size': '8px',
                    'text-valign': 'bottom',
                    'width': 8, 'height': 8
                }
            },
            {
                selector: 'edge',
                style: { 'width': 0.5, 'line-color': '#555', 'curve-style': 'bezier' }
            }
        ],
        layout: { name: 'cose', nodeRepulsion: 4000, padding: 50 }
    });
}
drawGraph();
    </script>
</body>
</html>
